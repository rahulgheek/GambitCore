<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Node.js Chess</title>
    <link rel="stylesheet" href="/public/css/style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #2f2f2f;">

    <div class="panel-card" style="padding: 40px; width: 350px;">
        <h2 style="text-align: center; margin-bottom: 20px;">Login</h2>
        
        <input type="email" id="email" placeholder="Email" style="width: 100%; padding: 10px; margin-bottom: 15px; background: #1a1a1a; color: white; border: 1px solid #444; border-radius: 5px;">
        
        <input type="password" id="password" placeholder="Password" style="width: 100%; padding: 10px; margin-bottom: 20px; background: #1a1a1a; color: white; border: 1px solid #444; border-radius: 5px;">
        
        <button class="btn primary" onclick="handleLogin()" style="width: 100%; padding: 12px; font-size: 1.1rem;">Login</button>
        <p id="error-msg" style="color: #ff4c4c; text-align: center; margin-top: 15px; display: none;"></p>
    </div>

    <script>
        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                // Send the data to your new backend API
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    // The browser automatically saved the cookie! Now redirect to the protected dashboard.
                    window.location.href = '/dashboard';
                } else {
                    errorMsg.textContent = data.message;
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = "Server error. Try again later.";
                errorMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
